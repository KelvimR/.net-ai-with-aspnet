name: CI - .NET + CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      #Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      #Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      #Cache NuGet
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      #Restore
      - name: Restore dependencies
        run: dotnet restore "./dotnet-ai-with-aspnet/dotnet-ai-with-aspnet.slnx"

      #Build
      - name: Build
        run: dotnet build ./dotnet-ai-with-aspnet/*.slnx --configuration Release --no-restore

      #Tests
      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      #Lint / Formatação
      - name: Check code formatting
        run: dotnet format --verify-no-changes

      #Inicializar CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      #Análise de segurança
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Success message
        if: needs.ci.result == 'success'
        run: echo "Pipeline executado com sucesso!"

      - name: Failure message
        if: failure()
        run: echo "Pipeline falhou ou vulnerabilidades detectadas. Verifique o CodeQL."